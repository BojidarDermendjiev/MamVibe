services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-MomVibeDb}
      POSTGRES_USER: ${POSTGRES_USER:-momvibe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-momvibe} -d ${POSTGRES_DB:-MomVibeDb}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - momvibe-net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-MomVibeDb};Username=${POSTGRES_USER:-momvibe};Password=${POSTGRES_PASSWORD:-changeme}"
      JwtSettings__Secret: "${JWT_SECRET:-MomVibe-Super-Secret-Key-That-Is-At-Least-32-Characters-Long-2024!}"
      FrontendUrl: "${FRONTEND_URL:-http://localhost}"
    ports:
      - "8080:8080"
    networks:
      - momvibe-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
    networks:
      - momvibe-net

  # Uncomment to enable pgAdmin
  # pgadmin:
  #   image: dpage/pgadmin4
  #   restart: unless-stopped
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@momvibe.com
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #   ports:
  #     - "5050:80"
  #   depends_on:
  #     - postgres
  #   networks:
  #     - momvibe-net

volumes:
  pgdata:

networks:
  momvibe-net:
    driver: bridge
