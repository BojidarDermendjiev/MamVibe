services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-MamVibeDb}
      POSTGRES_USER: ${POSTGRES_USER:-mamvibe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--set=password_encryption=md5"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mamvibe} -d ${POSTGRES_DB:-MamVibeDb}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    networks:
      - db-net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: "Host=pgbouncer;Port=6432;Database=${POSTGRES_DB:-MamVibeDb};Username=${POSTGRES_USER:-mamvibe};Password=${POSTGRES_PASSWORD:-changeme};No Reset On Close=true"
      Redis__Url: "redis:6379"
      FrontendUrl: "${FRONTEND_URL:-http://localhost}"
      AllowedHosts: "${ALLOWED_HOSTS:-localhost;api;api:8080}"

      # ── Auth ────────────────────────────────────────────────────────────────
      JwtSettings__Secret: "${JWT_SECRET:?JWT_SECRET must be set in .env}"
      GoogleAuth__ClientId: "${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID must be set in .env}"
      GoogleAuth__ClientSecret: "${GOOGLE_CLIENT_SECRET:?GOOGLE_CLIENT_SECRET must be set in .env}"

      # ── Stripe ──────────────────────────────────────────────────────────────
      Stripe__SecretKey: "${STRIPE_SECRET_KEY:?STRIPE_SECRET_KEY must be set in .env}"
      Stripe__PublishableKey: "${STRIPE_PUBLISHABLE_KEY}"
      Stripe__WebhookSecret: "${STRIPE_WEBHOOK_SECRET:?STRIPE_WEBHOOK_SECRET must be set in .env}"
      Stripe__WalletWebhookSecret: "${STRIPE_WALLET_WEBHOOK_SECRET}"

      # ── AI providers ────────────────────────────────────────────────────────
      # Anthropic is used for vision tasks (listing suggest, moderation, price suggestion)
      Anthropic__ApiKey: "${ANTHROPIC_API_KEY}"
      # Groq is used for the chat widget (free tier, fast) — set AI_CHAT_PROVIDER=anthropic to switch
      Groq__ApiKey: "${GROQ_API_KEY}"
      AI__ChatProvider: "${AI_CHAT_PROVIDER:-groq}"

      # ── Cloudflare Turnstile ────────────────────────────────────────────────
      Cloudflare__TurnstileSiteKey: "${TURNSTILE_SITE_KEY}"
      Cloudflare__TurnstileSecretKey: "${TURNSTILE_SECRET_KEY:?TURNSTILE_SECRET_KEY must be set in .env}"

      # ── SMTP ────────────────────────────────────────────────────────────────
      Smtp__Host: "${SMTP_HOST}"
      Smtp__Port: "${SMTP_PORT:-587}"
      Smtp__Username: "${SMTP_USERNAME}"
      Smtp__Password: "${SMTP_PASSWORD}"
      Smtp__FromEmail: "${SMTP_FROM_EMAIL:-noreply@mamvibe.com}"
      Smtp__FromName: "${SMTP_FROM_NAME:-MamVibe}"
      Smtp__EnableSsl: "true"

      # ── Couriers ────────────────────────────────────────────────────────────
      Econt__Username: "${ECONT_USERNAME}"
      Econt__Password: "${ECONT_PASSWORD}"
      Speedy__Username: "${SPEEDY_USERNAME}"
      Speedy__Password: "${SPEEDY_PASSWORD}"
      BoxNow__ApiKey: "${BOXNOW_API_KEY}"
      PigeonExpress__ApiKey: "${PIGEONEXPRESS_API_KEY}"

      # ── TakeANap receipts ───────────────────────────────────────────────────
      TakeANap__ApiKey: "${TAKEANAP_API_KEY}"
      TakeANap__ApiSecret: "${TAKEANAP_API_SECRET}"
      TakeANap__ShopId: "${TAKEANAP_SHOP_ID}"

      # ── Nekorekten ──────────────────────────────────────────────────────────
      Nekorekten__ApiKey: "${NEKOREKTEN_API_KEY}"

      # ── n8n ─────────────────────────────────────────────────────────────────
      N8n__BaseUrl: "${N8N_BASE_URL:-http://n8n:5678/webhook/}"
      N8n__Enabled: "${N8N_ENABLED:-false}"
      N8n__WebhookSecret: "${N8N_WEBHOOK_SECRET:?N8N_WEBHOOK_SECRET must be set in .env}"

      # ── Admin seed (disable after first deploy) ──────────────────────────────
      AdminSeed__Enabled: "${ADMIN_SEED_ENABLED:-false}"
      AdminSeed__Email: "${ADMIN_EMAIL}"
      AdminSeed__Password: "${ADMIN_PASSWORD}"
      AdminSeed__DisplayName: "${ADMIN_DISPLAY_NAME:-Admin}"
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/wwwroot/uploads
      - logs:/app/logs
      - dataprotection:/app/dataprotection-keys
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
    networks:
      - mamvibe-net
      - db-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:8080"
    networks:
      - mamvibe-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1
    volumes:
      - redis_data:/data
    networks:
      - mamvibe-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 300M

  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-MamVibeDb}
      DB_USER: ${POSTGRES_USER:-mamvibe}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      LISTEN_PORT: 6432
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 500
      DEFAULT_POOL_SIZE: 20
      AUTH_TYPE: md5
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - db-net

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      # N8N_ENCRYPTION_KEY MUST be set in .env — the default is insecure and must not be used in production.
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY must be set in .env}
      - WEBHOOK_URL=http://localhost:5678/
      # Basic auth protects n8n even in local dev — prevents accidental exposure if host is not localhost-only.
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_ADMIN_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_ADMIN_PASSWORD:?N8N_ADMIN_PASSWORD must be set in .env}
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "127.0.0.1:5678:5678"
    networks:
      - mamvibe-net

  # ── Observability ─────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - mamvibe-net
    ports:
      - "127.0.0.1:9090:9090"

  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - mamvibe-net

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set in .env}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - mamvibe-net

  # Uncomment to enable pgAdmin
  # pgadmin:
  #   image: dpage/pgadmin4
  #   restart: unless-stopped
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@mamvibe.com
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #   ports:
  #     - "5050:80"
  #   depends_on:
  #     - postgres
  #   networks:
  #     - mamvibe-net

volumes:
  pgdata:
  redis_data:
  n8n_data:
  uploads:
  logs:
  dataprotection:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  mamvibe-net:
    driver: bridge
  db-net:
    driver: bridge
