services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-MamVibeDb}
      POSTGRES_USER: ${POSTGRES_USER:-mamvibe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mamvibe} -d ${POSTGRES_DB:-MamVibeDb}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mamvibe-net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-MamVibeDb};Username=${POSTGRES_USER:-mamvibe};Password=${POSTGRES_PASSWORD:-changeme}"
      JwtSettings__Secret: "${JWT_SECRET:-MamVibe-Super-Secret-Key-That-Is-At-Least-32-Characters-Long-2024!}"
      FrontendUrl: "${FRONTEND_URL:-http://localhost}"
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/wwwroot/uploads
    networks:
      - mamvibe-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
    networks:
      - mamvibe-net

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-changeme-replace-in-production}
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"
    networks:
      - mamvibe-net

  # Uncomment to enable pgAdmin
  # pgadmin:
  #   image: dpage/pgadmin4
  #   restart: unless-stopped
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@mamvibe.com
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #   ports:
  #     - "5050:80"
  #   depends_on:
  #     - postgres
  #   networks:
  #     - mamvibe-net

volumes:
  pgdata:
  n8n_data:
  uploads:

networks:
  mamvibe-net:
    driver: bridge
