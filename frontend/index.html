<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta — overridden per-page by react-helmet-async -->
    <title>MamVibe — Buy, Sell &amp; Donate Baby Items</title>
    <meta name="description" content="MamVibe is a free platform for Bulgarian families to buy, sell, and donate second-hand baby clothes, strollers, toys and more. Give baby items a second life." />
    <meta name="robots" content="index, follow" />

    <!-- Canonical (fallback; per-page canonical injected by helmet) -->
    <link rel="canonical" href="https://mamvibe.com/" />

    <!-- Favicon & app icons -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MamVibe" />
    <meta property="og:title" content="MamVibe — Buy, Sell &amp; Donate Baby Items" />
    <meta property="og:description" content="A free platform for Bulgarian families to buy, sell, and donate second-hand baby clothes, strollers, toys and more." />
    <meta property="og:image" content="https://mamvibe.com/hero-bg.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://mamvibe.com/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="bg_BG" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MamVibe — Buy, Sell &amp; Donate Baby Items" />
    <meta name="twitter:description" content="A free platform for Bulgarian families to buy, sell, and donate second-hand baby clothes, strollers, toys and more." />
    <meta name="twitter:image" content="https://mamvibe.com/hero-bg.jpg" />

    <!-- Hreflang for bilingual content (EN / BG) -->
    <link rel="alternate" hreflang="en" href="https://mamvibe.com/" />
    <link rel="alternate" hreflang="bg" href="https://mamvibe.com/" />
    <link rel="alternate" hreflang="x-default" href="https://mamvibe.com/" />

    <!-- Theme color for PWA / browser chrome -->
    <meta name="theme-color" content="#945c67" />

    <!-- Google Search Console verification -->
    <meta name="google-site-verification" content="YOUR_GOOGLE_SEARCH_CONSOLE_VERIFICATION_CODE" />

    <!-- Preconnect to external origins used at paint time (images, analytics) -->
    <link rel="preconnect" href="https://www.googletagmanager.com" />
    <link rel="preconnect" href="https://www.google-analytics.com" />

    <!-- DNS-prefetch for less-critical third parties -->
    <link rel="dns-prefetch" href="https://accounts.google.com" />
    <link rel="dns-prefetch" href="https://js.stripe.com" />
    <link rel="dns-prefetch" href="https://challenges.cloudflare.com" />

    <!-- Google Identity Services (for Sign In with Google) -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Google Tag Manager -->
    <script>
      (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':

      j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=

      })(window,document,'script','dataLayer','GTM-XXXXXXX');
    </script>
    <!-- End Google Tag Manager -->

    <!-- Google Analytics (gtag.js) -->

    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>
    <!-- End Google Analytics -->
  </head>

      <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-XXXXXXX"
        height="0" width="0" style="display:none;visibility:hidden"></iframe>
    </noscript>
    <!-- End Google Tag Manager (noscript) -->

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

</html>
