name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend (.NET 8)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('backend/**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore dependencies
        run: dotnet restore backend/MomVibe.sln

      - name: Build
        run: dotnet build backend/MomVibe.sln --no-restore

      - name: Run unit tests
        run: dotnet test backend/tests/MomVibe.UnitTests --no-build --verbosity normal

      - name: Run integration tests
        run: dotnet test backend/tests/MomVibe.IntegrationTests --no-build --verbosity normal

  frontend:
    name: Frontend (React + TypeScript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: rm -rf node_modules package-lock.json && npm install
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Type check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build
        env:
          JWT_SECRET: ci-build-placeholder-not-used-at-runtime
          N8N_ENCRYPTION_KEY: ci-build-placeholder-not-used-at-runtime
          N8N_ADMIN_PASSWORD: ci-build-placeholder-not-used-at-runtime
          N8N_WEBHOOK_SECRET: ci-build-placeholder-not-used-at-runtime
          GOOGLE_CLIENT_ID: ci-build-placeholder-not-used-at-runtime
          GOOGLE_CLIENT_SECRET: ci-build-placeholder-not-used-at-runtime
          STRIPE_SECRET_KEY: ci-build-placeholder-not-used-at-runtime
          STRIPE_WEBHOOK_SECRET: ci-build-placeholder-not-used-at-runtime
          ANTHROPIC_API_KEY: ci-build-placeholder-not-used-at-runtime
          TURNSTILE_SECRET_KEY: ci-build-placeholder-not-used-at-runtime
